workflows:
  ios-testflight:
    name: 2048 Abyss iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ASC API Key        # ⚠ 与 Codemagic 后台 ASC API key 集成同名(一字不差)
    environment:
      groups:
        - ios_signing                        # 含 CERTIFICATE_PRIVATE_KEY(Secure),见设置④
      vars:
        BUNDLE_ID: "com.aispeeds.abyss2048"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: "6788542655"       # App Store Connect 数字 Apple ID
      node: 20                               # Capacitor 6(Cap8 才需 22)
      xcode: latest                          # 苹果强制最新 SDK 才收,别钉旧版
      cocoapods: default
    scripts:
      - name: npm 依赖
        script: npm ci || npm install
      - name: 生成 iOS 工程(www/ 已是 webDir,无需 web 构建)
        script: |
          set -e
          npx cap add ios
          npx cap sync ios
      - name: 图标 + 启动屏(源图在 assets/)
        script: npx @capacitor/assets generate --ios
      - name: 注入 Info.plist(AdMob + ATT + 免出口合规)
        script: |
          set -e
          PLIST=ios/App/App/Info.plist
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST"
          # AdMob App ID(缺了 Google Mobile Ads SDK 启动即崩)
          plutil -replace GADApplicationIdentifier -string "ca-app-pub-2141208066469648~7490076385" "$PLIST"
          # ATT 授权弹窗文案(缺了调 requestTrackingAuthorization 会崩/被拒)
          plutil -replace NSUserTrackingUsageDescription -string "Your device identifier is used to deliver and measure more relevant ads." "$PLIST"
          plutil -p "$PLIST" | grep -E "GADApplicationIdentifier|NSUserTrackingUsageDescription|ITSApp" || true
      - name: 签名(建证书 + 描述文件)
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 递增构建号
        script: |
          set -e
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))
      - name: 打 IPA(Cap6 有 Podfile → workspace)
        script: |
          set -e
          if [ -d ios/App/App.xcworkspace ]; then
            xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa --project ios/App/App.xcodeproj --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - tangzy09@gmail.com
        notify:
          success: true
          failure: true
